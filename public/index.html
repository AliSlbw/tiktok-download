<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TikDown — TikTok Downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #161616;
      --border: #2a2a2a;
      --accent: #fe2c55;
      --accent2: #25f4ee;
      --text: #efefef;
      --muted: #555;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(254,44,85,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(37,244,238,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.6s ease both;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 12vw, 5.5rem);
      letter-spacing: 4px;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .search-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 6px 6px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(254,44,85,0.1);
    }

    .search-icon { color: var(--muted); font-size: 1.1rem; flex-shrink: 0; }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 10px 0;
    }

    .search-box input::placeholder { color: var(--muted); }

    .btn-go {
      background: linear-gradient(135deg, var(--accent), #c4002a);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-go:hover { opacity: 0.85; }
    .btn-go:active { transform: scale(0.96); }
    .btn-go:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 18px;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }
    .status.err { color: var(--accent); }
    .status.ok { color: var(--accent2); }

    .progress {
      height: 2px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 24px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .progress.active { opacity: 1; }
    .progress-bar {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      animation: progress 1.2s infinite ease-in-out;
    }
    @keyframes progress {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    .result { display: none; animation: fadeUp 0.4s ease both; }
    .result.show { display: block; }

    .video-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }

    /* ─── SLIDESHOW ─── */
    .thumb-wrap {
      position: relative;
      aspect-ratio: 16/9;
      background: #111;
      overflow: hidden;
      user-select: none;
    }

    .slides-track {
      display: flex;
      height: 100%;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    .slide {
      flex: 0 0 100%;
      height: 100%;
      position: relative;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .thumb-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%);
      pointer-events: none;
      z-index: 2;
    }

    /* Nav arrows */
    .slide-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s, opacity 0.2s;
      opacity: 0;
      backdrop-filter: blur(6px);
    }

    .thumb-wrap:hover .slide-btn { opacity: 1; }
    .slide-btn:hover { background: rgba(254,44,85,0.6); }
    .slide-btn.prev { left: 10px; }
    .slide-btn.next { right: 10px; }
    .slide-btn:disabled { opacity: 0 !important; cursor: default; }

    /* Dots */
    .slide-dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: background 0.2s, transform 0.2s;
      cursor: pointer;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.35);
    }

    /* Slide counter badge */
    .slide-counter {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 5;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 99px;
      letter-spacing: 1px;
    }

    /* Slide type badge */
    .slide-type-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 5;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Touch / swipe hint */
    .swipe-hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      color: rgba(255,255,255,0.45);
      font-size: 0.65rem;
      letter-spacing: 1px;
      white-space: nowrap;
      animation: fadeHint 3s 1.5s forwards;
      pointer-events: none;
    }

    @keyframes fadeHint {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; }
    }

    .video-meta {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .video-title {
      font-weight: 500;
      font-size: 0.9rem;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    .video-author { font-size: 0.78rem; font-weight: 300; }

    .title-author {
      color: var(--accent2);
      text-decoration: none;
    }

    .dl-label {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .dl-list { display: flex; flex-direction: column; gap: 8px; }

    .dl-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 400;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .dl-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }

    .dl-item.nowm::before { background: var(--accent); }
    .dl-item.hd::before { background: #60a5fa; }
    .dl-item.img::before { background: #2eff46; }
    .dl-item.wm::before { background: #fbbf24; }
    .dl-item.audio::before { background: var(--accent2); }

    .dl-item:hover {
      border-color: #3a3a3a;
      background: #1e1e1e;
      transform: translateX(4px);
    }

    .dl-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .dl-item.nowm .dl-icon { background: rgba(254,44,85,0.1); }
    .dl-item.hd .dl-icon { background: rgba(96,165,250,0.1); }
    .dl-item.img .dl-icon { background: rgba(46,255,70,0.1); }
    .dl-item.wm .dl-icon { background: rgba(251,191,36,0.1); }
    .dl-item.audio .dl-icon { background: rgba(37,244,238,0.1); }

    .dl-info { flex: 1; }
    .dl-title { font-weight: 500; font-size: 0.85rem; }
    .dl-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    .dl-arrow {
      color: var(--muted);
      font-size: 1rem;
      transition: transform 0.2s, color 0.2s;
    }
    .dl-item:hover .dl-arrow { transform: translateX(4px); color: var(--text); }

    footer {
      margin-top: 56px;
      text-align: center;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .btn-go { padding: 12px 16px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">TIKDOWN</div>
      <p class="tagline">Download TikTok tanpa watermark</p>
    </header>

    <div class="search-box">
      <span class="search-icon">🔗</span>
      <input type="text" id="urlInput" placeholder="Paste link TikTok di sini..."/>
      <button class="btn-go" id="btn" onclick="doDownload()">Unduh</button>
    </div>

    <div class="progress" id="progress"><div class="progress-bar"></div></div>
    <div class="status" id="status"></div>

    <div class="result" id="result">
      <div class="video-card" id="videoCard" style="display:none">
        <div class="thumb-wrap" id="thumbWrap">
          <!-- Slideshow injected here by JS -->
        </div>
        <div class="video-meta">
          <div class="video-title" id="vTitle"></div>
          <div class="video-author" id="vAuthor">
            <a href="" class="title-author" id="tiktok-author"></a>
          </div>
        </div>
      </div>

      <p class="dl-label">Pilih Format</p>
      <div class="dl-list" id="dlList"></div>
    </div>

    <footer>Free · No Watermark · Fast</footer>
  </div>

  <script>
    // ─── Slideshow state ───────────────────────────────────────
    let slideIndex = 0;
    let slideTotal = 0;
    let touchStartX = 0;

    function buildSlideshow(images, isVideo) {
      const wrap = document.getElementById('thumbWrap');
      wrap.innerHTML = '';
      slideIndex = 0;
      slideTotal = images.length;

      // Type badge
      const badge = document.createElement('div');
      badge.className = 'slide-type-badge';
      badge.textContent = isVideo ? '▶ VIDEO' : '🖼 FOTO';
      wrap.appendChild(badge);

      // Track
      const track = document.createElement('div');
      track.className = 'slides-track';
      track.id = 'slidesTrack';
      images.forEach(src => {
        const slide = document.createElement('div');
        slide.className = 'slide';
        const img = document.createElement('img');
        img.src = src;
        img.alt = '';
        img.loading = 'lazy';
        slide.appendChild(img);
        track.appendChild(slide);
      });
      wrap.appendChild(track);

      // Overlay gradient
      const overlay = document.createElement('div');
      overlay.className = 'thumb-overlay';
      wrap.appendChild(overlay);

      if (images.length > 1) {
        // Prev button
        const prev = document.createElement('button');
        prev.className = 'slide-btn prev';
        prev.innerHTML = '‹';
        prev.id = 'slidePrev';
        prev.onclick = () => goSlide(slideIndex - 1);
        wrap.appendChild(prev);

        // Next button
        const next = document.createElement('button');
        next.className = 'slide-btn next';
        next.innerHTML = '›';
        next.id = 'slideNext';
        next.onclick = () => goSlide(slideIndex + 1);
        wrap.appendChild(next);

        // Counter
        const counter = document.createElement('div');
        counter.className = 'slide-counter';
        counter.id = 'slideCounter';
        counter.textContent = '1 / ' + images.length;
        wrap.appendChild(counter);

        // Dots
        const dots = document.createElement('div');
        dots.className = 'slide-dots';
        dots.id = 'slideDots';
        images.forEach((_, i) => {
          const dot = document.createElement('div');
          dot.className = 'dot' + (i === 0 ? ' active' : '');
          dot.onclick = () => goSlide(i);
          dots.appendChild(dot);
        });
        wrap.appendChild(dots);

        // Swipe hint
        const hint = document.createElement('div');
        hint.className = 'swipe-hint';
        hint.textContent = '← geser →';
        wrap.appendChild(hint);

        // Touch / swipe support
        wrap.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        wrap.addEventListener('touchend', e => {
          const dx = e.changedTouches[0].clientX - touchStartX;
          if (Math.abs(dx) > 40) goSlide(slideIndex + (dx < 0 ? 1 : -1));
        }, { passive: true });

        // Mouse drag support
        let mouseStartX = 0, isDragging = false;
        wrap.addEventListener('mousedown', e => { mouseStartX = e.clientX; isDragging = true; });
        wrap.addEventListener('mouseup', e => {
          if (!isDragging) return;
          isDragging = false;
          const dx = e.clientX - mouseStartX;
          if (Math.abs(dx) > 40) goSlide(slideIndex + (dx < 0 ? 1 : -1));
        });
        wrap.addEventListener('mouseleave', () => { isDragging = false; });

        updateSlide();
      }
    }

    function goSlide(idx) {
      if (idx < 0 || idx >= slideTotal) return;
      slideIndex = idx;
      updateSlide();
    }

    function updateSlide() {
      const track = document.getElementById('slidesTrack');
      if (track) track.style.transform = `translateX(-${slideIndex * 100}%)`;

      const counter = document.getElementById('slideCounter');
      if (counter) counter.textContent = (slideIndex + 1) + ' / ' + slideTotal;

      const dots = document.getElementById('slideDots');
      if (dots) {
        [...dots.children].forEach((d, i) => d.classList.toggle('active', i === slideIndex));
      }

      const prev = document.getElementById('slidePrev');
      const next = document.getElementById('slideNext');
      if (prev) prev.disabled = slideIndex === 0;
      if (next) next.disabled = slideIndex === slideTotal - 1;
    }

    // ─── Type map ──────────────────────────────────────────────
    const typeMap = {
      'no watermark': { cls: 'nowm', icon: '🎬', sub: 'Tanpa watermark' },
      'hd':           { cls: 'hd',   icon: '✨', sub: 'Kualitas tinggi' },
      'watermark':    { cls: 'wm',   icon: '📹', sub: 'Dengan watermark' },
      'audio':        { cls: 'audio',icon: '🎵', sub: 'File MP3' },
      'mp3':          { cls: 'audio',icon: '🎵', sub: 'File MP3' },
      'image':        { cls: 'img',  icon: '🖼️', sub: 'Gambar' },
    };

    function getType(title) {
      const t = title.toLowerCase();
      if (t.includes('hd'))                          return typeMap['hd'];
      if (t.includes('no watermark'))                return typeMap['no watermark'];
      if (t.includes('audio') || t.includes('mp3'))  return typeMap['audio'];
      if (t.includes('watermark'))                   return typeMap['watermark'];
      if (t.includes('gambar'))                      return typeMap['image'];
      return { cls: 'nowm', icon: '⬇️', sub: 'Download' };
    }

    // ─── Main download handler ─────────────────────────────────
    async function doDownload() {
      const url = document.getElementById('urlInput').value.trim();
      const progress = document.getElementById('progress');
      const result = document.getElementById('result');
      const btn = document.getElementById('btn');

      if (!url) { setStatus('Masukkan link dulu!', 'err'); return; }

      result.classList.remove('show');
      progress.classList.add('active');
      setStatus('Mengambil data...', '');
      btn.disabled = true;

      try {
        const res = await fetch('/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await res.json();

        if (!data.success) { setStatus(data.error || 'Gagal.', 'err'); return; }

        const videoCard = document.getElementById('videoCard');

        // Build slideshow
        // Cek apakah post ini carousel foto (ada link "Gambar" di links)
        const imageLinks = data.links.filter(l =>
          l.title.toLowerCase().includes('gambar') ||
          l.title.toLowerCase().includes('image') ||
          l.title.toLowerCase().includes('photo')
        );

        // Prioritas: data.images → imageLinks → data.thumbnail
        let images = null;
        let isPhoto = false;

        if (Array.isArray(data.images) && data.images.length > 0) {
          images = data.images;
          isPhoto = data.images.length > 1;
        } else if (imageLinks.length > 0) {
          // Ambil URL dari link gambar sebagai slide preview
          images = imageLinks.map(l => l.url);
          isPhoto = true;
        } else if (data.thumbnail) {
          images = [data.thumbnail];
          isPhoto = false;
        }

        if (images) {
          buildSlideshow(images, !isPhoto);
          document.getElementById('vTitle').textContent = data.title || '';
          document.getElementById('tiktok-author').href = 'https://tiktok.com/@' + (data.username || '');
          document.getElementById('tiktok-author').textContent = data.author ? '@' + data.author : '';
          videoCard.style.display = 'block';
        } else {
          videoCard.style.display = 'none';
        }

        // Download links
        const list = document.getElementById('dlList');
        list.innerHTML = '';
        data.links.forEach(item => {
          const type = getType(item.title);
          const isAudio = item.title.toLowerCase().includes('audio') || item.title.toLowerCase().includes('mp3');
          const ext = isAudio ? 'mp3' : 'mp4';
          const filename = 'tikdown_' + Date.now() + '.' + ext;

          const a = document.createElement('a');
          a.href = item.url;
          a.download = filename;
          a.className = 'dl-item ' + type.cls;
          a.innerHTML = `
            <div class="dl-icon">${type.icon}</div>
            <div class="dl-info">
              <div class="dl-title">${item.title}</div>
              <div class="dl-sub">${type.sub}</div>
            </div>
            <span class="dl-arrow">⬇</span>
          `;
          list.appendChild(a);
        });

        setStatus(data.links.length + ' format tersedia', 'ok');
        result.classList.add('show');

      } catch (e) {
        setStatus('Terjadi kesalahan. Coba lagi.', 'err');
        if (!url.inclides('tiktok.com')) setStatus('Format URL salah.', 'err');
      } finally {
        progress.classList.remove('active');
        btn.disabled = false;
      }
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doDownload();
    });
  </script>
</body>
</html>
